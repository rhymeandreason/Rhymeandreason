<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lab CMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #efece5;
    --elevated: #ffffff;
    --border: rgba(42, 42, 40, 0.10);
    --border-strong: rgba(42, 42, 40, 0.18);
    --text: #2a2a28;
    --text-muted: #8a8678;
    --text-soft: #b6b1a4;
    --accent: #6e6154;        /* warm clay */
    --accent-soft: #ead9c5;
    --sage: #6f7d6a;
    --rose: #a85a4a;
    --rose-soft: rgba(168, 90, 74, 0.10);
    --shadow-sm: 0 1px 2px rgba(42, 42, 40, 0.04);
    --shadow-md: 0 4px 16px rgba(42, 42, 40, 0.06);
    --radius: 12px;
    --radius-sm: 8px;
    --sans: "Futura", "Futura PT", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    max-width: 940px;
    margin: 0 auto;
    padding: 3.5rem 2rem 6rem;
    color: var(--text);
    background: var(--bg);
    line-height: 1.6;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---------- Masthead ---------- */
  .masthead { margin-bottom: 1.5rem; }
  .eyebrow {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--text-soft); font-weight: 500; margin-bottom: 0.5rem;
  }
  h1 {
    margin: 0; font-size: 2rem; font-weight: 600; letter-spacing: 0.01em;
    text-transform: uppercase;
  }
  .hint { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.75rem; max-width: 48ch; }
  .hint code {
    font-family: ui-monospace, "JetBrains Mono", monospace;
    background: var(--surface); color: var(--accent);
    padding: 0.1rem 0.4rem; border-radius: 5px; font-size: 0.82em;
  }

  /* ---------- Build toolbar ---------- */
  .toolbar {
    display: flex; 
align-items: center; gap: 10px;
    margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border);
  }
  .build-btn {
    background: var(--text); color: var(--bg); border: none;
    padding: 0.65rem 1.5rem; border-radius: 999px; cursor: pointer;
    font-family: var(--sans); font-weight: 500; font-size: 0.85rem;
    display: inline-flex; align-items: center; gap: 0.5rem;
    transition: opacity 0.15s ease, transform 0.12s ease;
  }
  .build-btn:hover:not(:disabled) { opacity: 0.88; }
  .build-btn:active:not(:disabled) { transform: scale(0.98); }
  .build-btn:disabled { opacity: 0.5; cursor: default; }
  .draft-count { font-size: 0.82rem; color: var(--text-muted); font-weight: 400; }

  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 2.5rem; align-items: start; }

  /* ---------- Sidebar ---------- */
  .sidebar { position: sticky; top: 1.5rem; }
  .new-btn {
    margin-bottom: 1rem; width: 100%; padding: 0.7rem;
    background: none; color: var(--text-muted); border: 1px dashed var(--border-strong);
    border-radius: 999px; cursor: pointer;
    font-family: var(--sans); font-weight: 500; font-size: 0.82rem;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  .new-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(110,97,84,0.04); }
  .post-list { display: flex; flex-direction: column; gap: 0.15rem; }
  .post-list button {
    text-align: left; background: none; border: none; padding: 0.6rem 0.7rem;
    border-radius: var(--radius-sm); cursor: grab; font-family: var(--sans);
    font-size: 0.88rem; color: var(--text); transition: background 0.12s ease;
  }
  .post-list button:hover { background: var(--surface); }
  .post-list button.active { background: var(--accent-soft); color: var(--accent); }
  .post-list button.dragging { opacity: 0.4; }
  .post-list .drop-indicator { height: 2px; margin: 0.2rem 0.7rem; background: var(--accent); border-radius: 1px; }
  .post-list .type-tag {
    font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-soft); display: block; margin-bottom: 0.2rem; font-weight: 500;
  }
  .post-list button.active .type-tag { color: var(--accent); opacity: 0.7; }
  .post-list .draft-tag {
    font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--rose);
    background: var(--rose-soft); border-radius: 4px; padding: 0.05rem 0.35rem; margin-left: 0.4rem;
  }

  /* ---------- Editor ---------- */
  form {
    display: flex; flex-direction: column;
    background: var(--elevated); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow-sm);
  }
  .form-top {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    padding: 1.1rem 2.25rem; background: var(--elevated);
    border-bottom: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .form-top-left { display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }
  .form-heading {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-soft); font-weight: 500;
  }
  label {
    display: flex; flex-direction: column; gap: 0.4rem;
    font-size: 0.72rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted);
  }
  input, textarea, select {
    font-family: var(--sans); font-size: 0.95rem; padding: 0.6rem 0.75rem;
    border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg);
    color: var(--text); letter-spacing: -0.005em;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  input:hover, textarea:hover, select:hover { border-color: var(--border-strong); }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent); background: var(--elevated);
    box-shadow: 0 0 0 3px rgba(110,97,84,0.12);
  }
  input[readonly] { background: var(--surface); color: var(--text-muted); cursor: default; }
  input.invalid { border-color: var(--rose); }
  input.invalid:focus { box-shadow: 0 0 0 3px var(--rose-soft); }
  .field-warn {
    font-size: 0.72rem; font-weight: 400; text-transform: none; letter-spacing: 0;
    color: var(--rose); font-style: italic;
  }
  .field-warn:empty { display: none; }

  /* ---------- File upload ---------- */
  input[type="file"] {
    padding: 0.4rem 0.5rem; font-size: 0.85rem; color: var(--text-muted); cursor: pointer;
  }
  input[type="file"]::file-selector-button {
    font-family: var(--sans); font-size: 0.78rem; font-weight: 500; letter-spacing: 0.02em;
    color: var(--text); background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: 999px; padding: 0.4rem 1rem; margin-right: 0.85rem; cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  input[type="file"]::file-selector-button:hover {
    border-color: var(--accent); color: var(--accent); background: rgba(110,97,84,0.04);
  }

  /* ---------- Date field (custom picker) ---------- */
  input.date-input {
    cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238a8678' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2'/><line x1='3' y1='9' x2='21' y2='9'/><line x1='8' y1='2' x2='8' y2='6'/><line x1='16' y1='2' x2='16' y2='6'/></svg>");
    background-repeat: no-repeat;
    background-position: right 0.75rem center;
    padding-right: 2.4rem;
  }
  input.date-input::placeholder { color: var(--text-soft); }

  .dp-popup {
    position: absolute; z-index: 200; width: 260px;
    background: var(--elevated); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0.85rem;
    box-shadow: 0 8px 28px rgba(42,42,40,0.14), 0 2px 6px rgba(42,42,40,0.06);
    opacity: 0; transform: translateY(-4px) scale(0.98); pointer-events: none;
    transition: opacity 0.12s ease, transform 0.12s ease;
  }
  .dp-popup.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .dp-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
  .dp-title {
    font-size: 0.82rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text);
  }
  .dp-nav {
    width: 1.9rem; height: 1.9rem; border: none; background: none; cursor: pointer;
    border-radius: 999px; color: var(--text-muted); font-size: 1.1rem; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .dp-nav:hover { background: var(--surface); color: var(--text); }
  .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .dp-dow {
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500;
    color: var(--text-soft); text-align: center; padding: 0.3rem 0;
  }
  .dp-day {
    aspect-ratio: 1; border: none; background: none; cursor: pointer;
    border-radius: 999px; font-family: var(--sans); font-size: 0.82rem; color: var(--text);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.1s ease, color 0.1s ease;
  }
  .dp-day:hover { background: var(--surface); }
  .dp-day.today { color: var(--accent); font-weight: 600; }
  .dp-day.selected { background: var(--accent); color: var(--bg); font-weight: 500; }
  .dp-day.selected:hover { background: var(--accent); }
  .dp-foot {
    display: flex; justify-content: space-between; margin-top: 0.7rem;
    padding-top: 0.6rem; border-top: 1px solid var(--border);
  }
  .dp-foot button {
    background: none; border: none; cursor: pointer; font-family: var(--sans);
    font-size: 0.74rem; font-weight: 500; letter-spacing: 0.02em; padding: 0.25rem 0.4rem;
    border-radius: 6px; transition: color 0.12s ease, background 0.12s ease;
  }
  .dp-today-btn { color: var(--accent); }
  .dp-today-btn:hover { background: rgba(110,97,84,0.08); }
  .dp-clear { color: var(--text-soft); }
  .dp-clear:hover { color: var(--rose); background: var(--rose-soft); }
  textarea {
    min-height: 9rem; resize: vertical; line-height: 1.7;
    font-size: 1rem;
  }
  /* the body is the heart of the writing experience — give it room */
  textarea[name="body"] { min-height: 16rem; }
  .row { display: flex; gap: 1rem; }
  .row > label { flex: 1; }

  .note-item {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 1.1rem; display: flex; flex-direction: column; gap: 0.7rem;
    position: relative; background: var(--bg);
  }
  .note-item .remove {
    position: absolute; top: 0.6rem; right: 0.6rem; background: none; border: none;
    cursor: pointer; color: var(--text-soft); font-size: 1.1rem; line-height: 1;
    width: 1.7rem; height: 1.7rem; border-radius: 6px; transition: background 0.12s ease, color 0.12s ease;
  }
  .note-item .remove:hover { background: var(--rose-soft); color: var(--rose); }

  .actions { display: flex; align-items: center; gap: 0.6rem; }
  button { font-family: var(--sans); }
  button.primary {
    background: var(--text); color: var(--bg); border: none; padding: 0.65rem 1.6rem;
    border-radius: 999px; cursor: pointer; font-weight: 500; font-size: 0.85rem;
    transition: opacity 0.15s ease, transform 0.12s ease;
  }
  button.primary:hover { opacity: 0.88; }
  button.primary:active { transform: scale(0.98); }
  button.secondary {
    background: none; border: 1px dashed var(--border-strong); padding: 0.6rem 1.2rem;
    border-radius: 999px; cursor: pointer; font-size: 0.82rem; font-weight: 500; color: var(--text-muted);
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  button.secondary:hover { border-color: var(--accent); color: var(--accent); background: rgba(110,97,84,0.04); }
  button.danger {
    background: none; color: var(--text-muted); border: 1px solid var(--border-strong); padding: 0.6rem 1.3rem;
    border-radius: 999px; cursor: pointer; font-size: 0.82rem; font-weight: 500;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  button.danger:hover { color: var(--rose); border-color: var(--rose); background: var(--rose-soft); }

  .thumbs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.45rem; }
  .thumbs img { height: 64px; border-radius: var(--radius-sm); border: 1px solid var(--border); object-fit: cover; }

  #status {
    font-size: 0.8rem; color: var(--text-muted); min-height: 1.1em;
    font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  fieldset { border: none; padding: 2.25rem; margin: 0; display: flex; flex-direction: column; gap: 1.4rem; }

  @media (max-width: 720px) {
    body { padding: 2.5rem 1.25rem 4rem; }
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    fieldset { padding: 1.5rem; }
    .form-top { padding: 0.9rem 1.5rem; }
  }
</style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="masthead">
        <p class="eyebrow">Writing Desk</p>
        <h1>Lab</h1>
        <p class="hint">A quiet, local-only editor. Saving writes to <code>lab/data/posts/</code>; posts stay in draft until you build.</p>
      </div>
      <div class="toolbar">
        <button class="build-btn" id="build-btn">Build site</button>
        <span class="draft-count" id="draft-count"></span>
      </div>
      <button class="new-btn" id="new-btn">+ New post</button>
      <div class="post-list" id="post-list"></div>
    </aside>
    <main class="main">
      <form id="post-form"></form>
      <p id="status"></p>
    </main>
  </div>

<script>
const listEl = document.getElementById('post-list');
const formEl = document.getElementById('post-form');
const statusEl = document.getElementById('status');
const buildBtn = document.getElementById('build-btn');
const draftCountEl = document.getElementById('draft-count');
let current = null; // current post object being edited, or null for "new"
let currentType = 'note';

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error((await res.json()).error || res.statusText);
  return res.json();
}

// ---------- custom date picker ----------
const DP_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const dpPad = n => String(n).padStart(2, '0');
const dpIso = (y, m, d) => `${y}-${dpPad(m + 1)}-${dpPad(d)}`;
let dpPopup = null, dpInput = null, dpYear = 0, dpMonth = 0;

function enhanceDates(root) {
  root.querySelectorAll('input[type="date"]').forEach(input => {
    if (input.dataset.dpEnhanced) return;
    input.dataset.dpEnhanced = '1';
    input.type = 'text';
    input.readOnly = true;
    input.placeholder = 'Select date';
    input.classList.add('date-input');
    input.addEventListener('click', () => openDp(input));
  });
}

function buildDpPopup() {
  dpPopup = document.createElement('div');
  dpPopup.className = 'dp-popup';
  document.body.appendChild(dpPopup);
  dpPopup.addEventListener('click', e => {
    const nav = e.target.closest('[data-nav]');
    if (nav) {
      dpMonth += Number(nav.dataset.nav);
      if (dpMonth < 0) { dpMonth = 11; dpYear--; }
      if (dpMonth > 11) { dpMonth = 0; dpYear++; }
      renderDp();
      return;
    }
    if (e.target.closest('[data-clear]')) { commitDp(''); return; }
    const day = e.target.closest('[data-iso]');
    if (day) commitDp(day.dataset.iso);
  });
  document.addEventListener('click', e => {
    if (!dpPopup.classList.contains('open')) return;
    if (dpPopup.contains(e.target) || e.target === dpInput) return;
    closeDp();
  });
  window.addEventListener('keydown', e => { if (e.key === 'Escape') closeDp(); });
}

function openDp(input) {
  if (!dpPopup) buildDpPopup();
  dpInput = input;
  const valid = /^\d{4}-\d{2}-\d{2}$/.test(input.value);
  const base = valid ? new Date(input.value + 'T00:00:00') : new Date();
  dpYear = base.getFullYear();
  dpMonth = base.getMonth();
  renderDp();
  const r = input.getBoundingClientRect();
  dpPopup.style.top = (r.bottom + window.scrollY + 6) + 'px';
  dpPopup.style.left = (r.left + window.scrollX) + 'px';
  dpPopup.classList.add('open');
}

function closeDp() { dpPopup?.classList.remove('open'); dpInput = null; }

function commitDp(iso) {
  if (!dpInput) return;
  dpInput.value = iso;
  dpInput.dispatchEvent(new Event('input', { bubbles: true }));
  dpInput.dispatchEvent(new Event('change', { bubbles: true }));
  closeDp();
}

function renderDp() {
  const sel = dpInput && /^\d{4}-\d{2}-\d{2}$/.test(dpInput.value) ? dpInput.value : null;
  const now = new Date();
  const todayIso = dpIso(now.getFullYear(), now.getMonth(), now.getDate());
  const startDay = new Date(dpYear, dpMonth, 1).getDay();
  const daysInMonth = new Date(dpYear, dpMonth + 1, 0).getDate();
  let html = `<div class="dp-head">
    <button type="button" class="dp-nav" data-nav="-1" aria-label="Previous month">‹</button>
    <span class="dp-title">${DP_MONTHS[dpMonth]} ${dpYear}</span>
    <button type="button" class="dp-nav" data-nav="1" aria-label="Next month">›</button>
  </div><div class="dp-grid">`;
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => html += `<span class="dp-dow">${d}</span>`);
  for (let i = 0; i < startDay; i++) html += '<span></span>';
  for (let day = 1; day <= daysInMonth; day++) {
    const iso = dpIso(dpYear, dpMonth, day);
    const cls = ['dp-day'];
    if (iso === sel) cls.push('selected');
    if (iso === todayIso) cls.push('today');
    html += `<button type="button" class="${cls.join(' ')}" data-iso="${iso}">${day}</button>`;
  }
  html += `</div><div class="dp-foot">
    <button type="button" class="dp-today-btn" data-iso="${todayIso}">Today</button>
    <button type="button" class="dp-clear" data-clear>Clear</button>
  </div>`;
  dpPopup.innerHTML = html;
}

let draggedSlug = null;
const dropIndicator = document.createElement('div');
dropIndicator.className = 'drop-indicator';

let existingSlugs = new Set();

async function loadList() {
  const posts = await api('/api/posts');
  existingSlugs = new Set(posts.map(p => p.slug));
  listEl.innerHTML = '';
  posts.forEach(p => {
    const btn = document.createElement('button');
    btn.innerHTML = `<span class="type-tag">${p.type}${p.draft ? '<span class="draft-tag">draft</span>' : ''}</span>${p.title || p.body?.slice(0, 30) || p.slug}`;
    if (current && current.slug === p.slug) btn.classList.add('active');
    btn.draggable = true;
    btn.dataset.slug = p.slug;
    btn.onclick = () => selectPost(p);
    btn.addEventListener('dragstart', () => {
      draggedSlug = p.slug;
      btn.classList.add('dragging');
    });
    btn.addEventListener('dragend', () => {
      draggedSlug = null;
      btn.classList.remove('dragging');
      dropIndicator.remove();
    });
    listEl.appendChild(btn);
  });

  const draftCount = posts.filter(p => p.draft).length;
  draftCountEl.textContent = draftCount ? `${draftCount} unbuilt post${draftCount === 1 ? '' : 's'}` : 'Everything built';
  return posts;
}

listEl.addEventListener('dragover', e => {
  if (!draggedSlug) return;
  e.preventDefault();
  const items = [...listEl.querySelectorAll('button:not(.dragging)')];
  const after = items.find(el => e.clientY < el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2);
  listEl.insertBefore(dropIndicator, after || null);
});
listEl.addEventListener('drop', async e => {
  e.preventDefault();
  if (!draggedSlug || !dropIndicator.parentNode) return;
  const slugs = [...listEl.children]
    .filter(el => el !== dropIndicator)
    .map(el => el.dataset.slug);
  const from = slugs.indexOf(draggedSlug);
  let to = [...listEl.children].indexOf(dropIndicator);
  if (from < to) to -= 1; // account for removing the dragged item shifting later indices
  slugs.splice(from, 1);
  slugs.splice(to, 0, draggedSlug);
  dropIndicator.remove();
  await api('/api/reorder', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ slugs }) });
  await loadList();
});

buildBtn.addEventListener('click', async () => {
  buildBtn.disabled = true;
  buildBtn.textContent = 'Building…';
  try {
    await api('/api/build', { method: 'POST' });
    statusEl.style.color = '#1a7f37';
    statusEl.textContent = 'Site built at ' + new Date().toLocaleTimeString();
    await loadList();
  } catch (err) {
    statusEl.style.color = '#c33';
    statusEl.textContent = 'Build error: ' + err.message;
  } finally {
    buildBtn.disabled = false;
    buildBtn.textContent = 'Build site';
  }
});

function uploadField(label, name, multiple) {
  return `<label>${label}
    <input type="file" name="${name}" accept="image/*" ${multiple ? 'multiple' : ''} data-upload>
    <div class="thumbs" data-thumbs-for="${name}"></div>
  </label>`;
}

function renderForm(post) {
  currentType = post.type;
  const isNew = !post.slug;
  let fields = '';
  if (post.type === 'note' || post.type === 'journal') {
    fields = `
      <label>Title (optional)<input type="text" name="title" value="${post.title || ''}"></label>
      <label>Date<input type="date" name="date" value="${post.date || ''}"></label>
      <label>Columns
        <select name="columns">
          <option value="1" ${post.columns === 1 ? 'selected' : ''}>1 (default)</option>
          <option value="2" ${post.columns === 2 ? 'selected' : ''}>2</option>
        </select>
      </label>
      <label>Body<textarea name="body">${post.body || ''}</textarea></label>
      ${uploadField('Images', 'images', true)}
    `;
  } else {
    fields = `
      <label>Title<input type="text" name="title" value="${post.title || ''}" required></label>
      <label>Subtitle<input type="text" name="subtitle" value="${post.subtitle || ''}"></label>
      <label>Date<input type="date" name="date" value="${post.date || ''}"></label>
      <label>Columns
        <select name="columns">
          <option value="1" ${post.columns === 1 ? 'selected' : ''}>1 (default)</option>
          <option value="2" ${post.columns === 2 ? 'selected' : ''}>2</option>
        </select>
      </label>
      ${uploadField('Main image', 'mainImage', false)}
      <label>Description<textarea name="description">${post.description || ''}</textarea></label>
      <div id="notes-list"></div>
      <button type="button" class="secondary" id="add-note">+ Add note</button>
    `;
  }

  formEl.innerHTML = `
    <div class="form-top">
      <div class="form-top-left">
        <span class="form-heading">${isNew ? 'New post' : 'Editing'}</span>
      </div>
      <div class="actions">
        ${isNew ? '' : '<button type="button" class="danger" id="delete-btn">Delete</button>'}
        <button type="submit" class="primary">Save</button>
      </div>
    </div>
    <fieldset>
      <label>Slug ${isNew ? '' : '(locked after creation)'}<input type="text" name="slug" value="${post.slug || ''}" ${isNew ? '' : 'readonly'} required></label>
      <label>Type
        <select name="type">
          <option value="note" ${post.type === 'note' ? 'selected' : ''}>Note</option>
          <option value="journal" ${post.type === 'journal' ? 'selected' : ''}>Journal</option>
          <option value="artifact" ${post.type === 'artifact' ? 'selected' : ''}>Artifact</option>
        </select>
      </label>
      ${fields}
    </fieldset>
  `;

  // relocate the persistent status node into the sticky header, under the heading
  formEl.querySelector('.form-top-left').appendChild(statusEl);

  formEl.querySelector('select[name=type]')?.addEventListener('change', e => {
    currentType = e.target.value;
    renderForm({ ...post, type: currentType });
  });

  // auto-fill the slug from the title for new posts, until the user edits it
  if (isNew) {
    const slugInput = formEl.querySelector('input[name=slug]');
    const titleInput = formEl.querySelector('input[name=title]');
    const warn = document.createElement('span');
    warn.className = 'field-warn';
    slugInput?.closest('label')?.appendChild(warn);
    const checkSlug = () => {
      const taken = slugInput.value && existingSlugs.has(slugInput.value);
      warn.textContent = taken ? 'A post with this slug already exists' : '';
      slugInput.classList.toggle('invalid', !!taken);
    };
    slugInput?.addEventListener('input', () => { slugInput.dataset.edited = '1'; checkSlug(); });
    titleInput?.addEventListener('input', () => {
      if (!slugInput || slugInput.dataset.edited) return;
      slugInput.value = uniqueSlug(slugify(titleInput.value));
      checkSlug();
    });
  }

  if (post.type === 'artifact') {
    const notesList = formEl.querySelector('#notes-list');
    const notes = post.notes ? [...post.notes] : [];
    function renderNotes() {
      notesList.innerHTML = notes.map((n, i) => `
        <div class="note-item" data-note-index="${i}">
          <button type="button" class="remove" data-remove-note="${i}">×</button>
          <label>Note title<input type="text" data-note-field="title" data-note-index="${i}" value="${n.title || ''}"></label>
          <label>Note date<input type="date" data-note-field="date" data-note-index="${i}" value="${n.date || ''}"></label>
          <label>Note body<textarea data-note-field="body" data-note-index="${i}">${n.body || ''}</textarea></label>
        </div>
      `).join('');
      notesList.querySelectorAll('[data-remove-note]').forEach(b => b.onclick = () => {
        notes.splice(Number(b.dataset.removeNote), 1);
        renderNotes();
      });
      notesList.querySelectorAll('[data-note-field]').forEach(inp => inp.oninput = () => {
        notes[Number(inp.dataset.noteIndex)][inp.dataset.noteField] = inp.value;
      });
      enhanceDates(notesList);
    }
    renderNotes();
    formEl.querySelector('#add-note').onclick = () => { notes.push({ title: '', date: '', body: '' }); renderNotes(); };
    formEl._getNotes = () => notes;
  }

  // image upload previews + tracking uploaded filenames
  formEl.querySelectorAll('[data-upload]').forEach(input => {
    const existing = input.name === 'mainImage'
      ? (post.mainImage ? [post.mainImage] : [])
      : (post.images || []);
    input._uploaded = [...existing];
    const thumbsEl = formEl.querySelector(`[data-thumbs-for="${input.name}"]`);
    function renderThumbs() {
      thumbsEl.innerHTML = input._uploaded.map(f => `<img src="images/${f}">`).join('');
    }
    renderThumbs();
    input.addEventListener('change', async () => {
      for (const file of input.files) {
        const dataUrl = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = reject;
          r.readAsDataURL(file);
        });
        const { filename } = await api('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: file.name, dataUrl }),
        });
        if (input.name === 'mainImage') input._uploaded = [filename];
        else input._uploaded.push(filename);
      }
      renderThumbs();
    });
  });

  formEl.querySelector('#delete-btn')?.addEventListener('click', async () => {
    if (!confirm('Delete this post?')) return;
    clearTimeout(autosaveTimer);
    await api('/api/posts/' + encodeURIComponent(post.slug), { method: 'DELETE' });
    statusEl.textContent = 'Deleted.';
    current = null;
    loadList();
    renderForm(blankPost('note'));
  });

  enhanceDates(formEl);
}

function slugify(s) {
  return (s || '')
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function uniqueSlug(base) {
  if (!base || !existingSlugs.has(base)) return base;
  let n = 2;
  while (existingSlugs.has(`${base}-${n}`)) n++;
  return `${base}-${n}`;
}

function blankPost(type) {
  return { type, columns: 1, date: new Date().toISOString().slice(0, 10) };
}

function selectPost(post) {
  clearTimeout(autosaveTimer);
  current = post;
  renderForm(post);
}

document.getElementById('new-btn').onclick = () => {
  clearTimeout(autosaveTimer);
  current = null;
  renderForm(blankPost('note'));
};

function postFromForm() {
  const data = new FormData(formEl);
  const post = { type: data.get('type') || currentType, slug: data.get('slug'), columns: Number(data.get('columns')) };
  if (post.type === 'note' || post.type === 'journal') {
    post.title = data.get('title') || '';
    post.date = data.get('date') || '';
    post.body = data.get('body') || '';
    post.images = formEl.querySelector('input[name=images]')?._uploaded || [];
  } else {
    post.title = data.get('title') || '';
    post.subtitle = data.get('subtitle') || '';
    post.date = data.get('date') || '';
    post.description = data.get('description') || '';
    post.mainImage = (formEl.querySelector('input[name=mainImage]')?._uploaded || [])[0] || '';
    post.notes = formEl._getNotes ? formEl._getNotes() : [];
  }
  return post;
}

let saveInFlight = null;
async function savePostNow(label) {
  if (!formEl.checkValidity()) return;
  const post = postFromForm();
  if (!post.slug) return;
  statusEl.style.color = '#1a7f37';
  statusEl.textContent = 'Saving…';
  const task = api('/api/posts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(post) })
    .then(async saved => {
      current = saved;
      statusEl.textContent = (label || 'Saved') + ' at ' + new Date().toLocaleTimeString();
      await loadList();
    })
    .catch(err => {
      statusEl.style.color = '#c33';
      statusEl.textContent = 'Error: ' + err.message;
    });
  saveInFlight = task;
  return task;
}

formEl.addEventListener('submit', e => {
  e.preventDefault();
  clearTimeout(autosaveTimer);
  savePostNow('Saved');
});

// ---------- debounced autosave ----------
const AUTOSAVE_DELAY = 1200;
let autosaveTimer = null;
formEl.addEventListener('input', () => {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => savePostNow('Autosaved'), AUTOSAVE_DELAY);
});
formEl.addEventListener('change', e => {
  if (e.target.matches('[data-upload]')) return; // upload already saves the file; autosave will pick up the reference on next input/change
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => savePostNow('Autosaved'), AUTOSAVE_DELAY);
});

renderForm(blankPost('note'));
loadList();
</script>
</body>
</html>
